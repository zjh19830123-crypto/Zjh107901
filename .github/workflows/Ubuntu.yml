name: Ubuntu
on:
  workflow_dispatch:

jobs:
  secure-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: 配置用户
        run: |
          sudo -i <<EOF
          if ! id -u ubuntu >/dev/null 2>&1; then
            useradd -m -s /bin/bash ubuntu
            usermod -aG sudo ubuntu
          fi
          echo "ubuntu:@Awf123456789" | chpasswd
          echo "ubuntu ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/ubuntu-ssh
          chmod 0440 /etc/sudoers.d/ubuntu-ssh
          EOF

      - name: 配置SSH服务
        run: |
          sudo -i <<EOF
          sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          systemctl restart ssh
          ufw allow from any to any  # 允许所有端口所有协议
          ufw reload
          grep -E "PasswordAuthentication|PermitRootLogin" /etc/ssh/sshd_config
          systemctl status ssh --no-pager
          ufw status  # 验证所有端口协议放行状态
          EOF

      - name: 安装Tailscale组网工具
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo apt clean

      - name: 连接Tailscale内网
        env:
          KEY: ${{ secrets.KEY }}
        run: |
          sudo tailscale up --authkey "$KEY" --hostname "github-ssh-${{ github.run_id }}"
          TAILSCALE_IP=""
          RETRIES=0
          while [ -z "$TAILSCALE_IP" ] && [ $RETRIES -lt 10 ]; do
            TAILSCALE_IP=$(sudo tailscale ip -4)
            sleep 3
            RETRIES=$((RETRIES + 1))
          done
          if [ -z "$TAILSCALE_IP" ]; then
            echo "Error: Failed to get Tailscale IPv4 address."
            exit 1
          fi
          echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV
          echo "SSH_USER=ubuntu" >> $GITHUB_ENV
          echo "SSH_PASSWORD=@Awf123456789" >> $GITHUB_ENV

      - name: 检测SSH端口连通性
        run: |
          echo "正在验证 ${{ env.TAILSCALE_IP }}:22 的SSH连通性..."
          if ! nc -z ${{ env.TAILSCALE_IP }} 22; then
            echo "Error: SSH Port 22 is not reachable on ${{ env.TAILSCALE_IP }}."
            exit 1
          fi

      - name: 展示SSH连接信息并持续保活
        run: |
          echo "======================================"
          echo "SSH远程连接信息"
          echo "======================================"
          echo "Tailscale内网IP: ${{ env.TAILSCALE_IP }}"
          echo "用户名: ${{ env.SSH_USER }}"
          echo "密码: ${{ env.SSH_PASSWORD }}"
          echo "连接命令: ssh ${{ env.SSH_USER }}@${{ env.TAILSCALE_IP }}"
          echo "======================================"
          while true; do
            echo "Ubuntu服务器运行中"
            sleep 300
          done
