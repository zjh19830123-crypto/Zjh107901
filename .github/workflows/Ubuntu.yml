name: Ubuntu
on:
  workflow_dispatch:

jobs:
  secure-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Set root user password
        run: |
          sudo -i <<EOF
          echo "root:@Awf123456789" | chpasswd
          EOF

      - name: Configure SSH Service（关闭键盘交互认证，纯密码登录）
        run: |
          sudo -i <<EOF
          # 开启密码登录、允许root登录
          sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          # 关键：关闭键盘交互认证，强制使用标准Password认证
          sed -i 's/^#KbdInteractiveAuthentication yes/KbdInteractiveAuthentication no/' /etc/ssh/sshd_config
          sed -i 's/^ChallengeResponseAuthentication yes/ChallengeResponseAuthentication no/' /etc/ssh/sshd_config

          systemctl restart ssh
          ufw allow from any to any
          ufw reload

          # 打印配置确认
          grep -E "PasswordAuthentication|PermitRootLogin|KbdInteractiveAuthentication|ChallengeResponseAuthentication" /etc/ssh/sshd_config
          systemctl status ssh --no-pager
          ufw status
          EOF

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo apt clean

      - name: Connect to Tailscale
        env:
          KEY: ${{ secrets.KEY }}
        run: |
          sudo tailscale up --authkey "$KEY" --hostname "github-ssh-${{ github.run_id }}"
          TAILSCALE_IP=""
          RETRIES=0
          while [ -z "$TAILSCALE_IP" ] && [ $RETRIES -lt 10 ]; do
            TAILSCALE_IP=$(sudo tailscale ip -4)
            sleep 3
            RETRIES=$((RETRIES + 1))
          done
          if [ -z "$TAILSCALE_IP" ]; then
            echo "Error: Failed to get Tailscale IPv4 address."
            exit 1
          fi
          echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV
          echo "SSH_USER=root" >> $GITHUB_ENV
          echo "SSH_PASSWORD=@Awf123456789" >> $GITHUB_ENV

      - name: Verify SSH Connection
        run: |
          echo "Verifying SSH connectivity to ${{ env.TAILSCALE_IP }}:22..."
          if ! nc -z ${{ env.TAILSCALE_IP }} 22; then
            echo "Error: SSH Port 22 is not reachable on ${{ env.TAILSCALE_IP }}."
            exit 1
          fi

      - name: Show SSH Info & Keep Alive
        run: |
          echo "======================================"
          echo "SSH Remote Connection Info"
          echo "======================================"
          echo "Tailscale Private IP: ${{ env.TAILSCALE_IP }}"
          echo "Username: ${{ env.SSH_USER }}"
          echo "Password: ${{ env.SSH_PASSWORD }}"
          echo "Connect Command: ssh ${{ env.SSH_USER }}@${{ env.TAILSCALE_IP }}"
          echo "======================================"
          while true; do
            echo "SSH Service running... Current Time: $(date '+%Y-%m-%d %H:%M:%S')"
            sleep 300
          done
