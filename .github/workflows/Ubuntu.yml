name: Ubuntu
on:
  workflow_dispatch:

jobs:
  Ubuntu_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: 创建并配置登录用户
        run: |
          sudo -i <<EOF
          if ! id -u ${{ secrets.UBUNTU_USER }} >/dev/null 2>&1; then
            useradd -m -s /bin/bash ${{ secrets.UBUNTU_USER }}
            usermod -aG sudo ${{ secrets.UBUNTU_USER }}
          fi
          echo "${{ secrets.UBUNTU_USER }}:${{ secrets.UBUNTU_PASSWORD }}" | chpasswd
          echo "${{ secrets.UBUNTU_USER }} ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/ubuntu-ssh
          chmod 0440 /etc/sudoers.d/ubuntu-ssh
          EOF

      - name: 配置SSH服务参数
        run: |
          sudo -i <<EOF
          sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sed -i '/^#KbdInteractiveAuthentication/c\KbdInteractiveAuthentication no' /etc/ssh/sshd_config
          sed -i '/^KbdInteractiveAuthentication/c\KbdInteractiveAuthentication no' /etc/ssh/sshd_config
          sed -i '/^#ChallengeResponseAuthentication/c\ChallengeResponseAuthentication no' /etc/ssh/sshd_config
          sed -i '/^ChallengeResponseAuthentication/c\ChallengeResponseAuthentication no' /etc/ssh/sshd_config
          systemctl restart ssh
          ufw allow from any to any
          ufw reload
          EOF

      - name: 安装Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo apt clean

      - name: 连接Tailscale组网
        env:
          KEY: ${{ secrets.KEY }}
        run: |
          sudo tailscale up --authkey "$KEY" --hostname "github-ssh-${{ github.run_id }}"
          TAILSCALE_IP=""
          RETRIES=0
          while [ -z "$TAILSCALE_IP" ] && [ $RETRIES -lt 10 ]; do
            TAILSCALE_IP=$(sudo tailscale ip -4)
            sleep 3
            RETRIES=$((RETRIES + 1))
          done
          if [ -z "$TAILSCALE_IP" ]; then
            echo "Error: Failed to get Tailscale IPv4 address."
            exit 1
          fi
          echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV
          echo "SSH_USER=${{ secrets.UBUNTU_USER }}" >> $GITHUB_ENV
          echo "SSH_PASSWORD=${{ secrets.UBUNTU_PASSWORD }}" >> $GITHUB_ENV

      - name: 检测SSH端口连通性
        run: |
          if ! nc -z ${{ env.TAILSCALE_IP }} 22; then
            echo "Error: SSH Port 22 is not reachable."
            exit 1
          fi

      - name: 输出连接信息并保持运行
        run: |
          echo "======================================"
          echo "SSH远程连接信息"
          echo "======================================"
          echo "Tailscale内网IP: ${{ env.TAILSCALE_IP }}"
          echo "用户名: ${{ env.SSH_USER }}"
          echo "密码: ${{ env.SSH_PASSWORD }}"
          echo "连接命令: ssh ${{ env.SSH_USER }}@${{ env.TAILSCALE_IP }}"
          echo "======================================"
          while true; do
            echo "SSH服务运行中，当前时间: $(date '+%Y-%m-%d %H:%M:%S')"
            sleep 300
          done
